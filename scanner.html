<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner Barcode</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
text-align:center;
padding:20px;
}

#reader{
width:320px;
margin:auto;
}
</style>
</head>

<body>

<h2>Scanner Barcode</h2>

<div id="reader"></div>

<p>Hasil Scan:</p>
<h3 id="hasil">-</h3>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

let scanned=false;

function onScanSuccess(decodedText){

if(scanned) return;
scanned=true;

document.getElementById("hasil").innerText=decodedText;

html5QrcodeScanner.clear();

setTimeout(function(){

tg.openTelegramLink(
"https://t.me/hypermart_retur_vendor_bot?start="+decodedText
);

},500);

}

const html5QrcodeScanner=new Html5QrcodeScanner(
"reader",
{
fps:12,
qrbox:250,
videoConstraints:{
facingMode:"environment"
}
}
);

html5QrcodeScanner.render(onScanSuccess);

</script>

</body>
</html>
