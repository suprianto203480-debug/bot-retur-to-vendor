<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner Barcode</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
text-align:center;
padding:20px;
}

#reader{
width:300px;
margin:auto;
}
</style>

</head>

<body>

<h2>Scanner Barcode</h2>

<div id="reader"></div>

<p>Hasil Scan:</p>
<h3 id="hasil">-</h3>

<script>

let scanned = false;

function onScanSuccess(decodedText){

if(scanned) return;
scanned = true;

document.getElementById("hasil").innerText = decodedText;

/* hentikan scanner */
html5QrcodeScanner.clear();

/* redirect ke bot telegram */
setTimeout(function(){
window.open(
"https://t.me/hypermart_retur_vendor_bot?start=" + decodedText,
"_self"
);
},300);

}

const html5QrcodeScanner = new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
}
);

html5QrcodeScanner.render(onScanSuccess);

</script>

</body>
</html>
