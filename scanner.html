<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner Barcode</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
text-align:center;
padding:20px;
}

#reader{
width:320px;
margin:auto;
}
</style>
</head>

<body>

<h2>Scanner Barcode</h2>

<div id="reader"></div>

<p>Hasil Scan:</p>
<h3 id="hasil">-</h3>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

let lastScan = "";

const html5QrCode = new Html5Qrcode("reader");

function onScanSuccess(decodedText){

// cegah scan barcode sama berulang cepat
if(decodedText === lastScan) return;

lastScan = decodedText;

document.getElementById("hasil").innerText = decodedText;

/* kirim barcode ke bot */
tg.sendData(decodedText);

}

/* langsung pakai kamera belakang */
Html5Qrcode.getCameras().then(devices => {

if (devices && devices.length) {

let backCamera = devices[devices.length - 1].id;

html5QrCode.start(
backCamera,
{
fps: 20,
qrbox: 250
},
onScanSuccess
);

}

}).catch(err => {
console.log(err);
});

</script>

</body>
</html>
