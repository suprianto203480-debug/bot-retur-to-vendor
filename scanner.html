<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner Barcode</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family: Arial;
text-align:center;
padding:20px;
}

#reader{
width:300px;
margin:auto;
}

h2{
margin-bottom:20px;
}

</style>

</head>

<body>

<h2>Scanner Barcode</h2>

<div id="reader"></div>

<p>Hasil Scan:</p>
<h3 id="hasil">-</h3>

<script>

const tg = window.Telegram.WebApp;

tg.ready();
tg.expand();

let scanned = false;

function onScanSuccess(decodedText){

if(scanned) return;
scanned = true;

document.getElementById("hasil").innerText = decodedText;

/* kirim barcode ke bot */
tg.sendData(JSON.stringify({
barcode: decodedText
}));

/* tutup scanner */
setTimeout(()=>{
tg.close();
},700);

}

const scanner = new Html5QrcodeScanner(
"reader",
{
fps:12,
qrbox:{width:250,height:250}
},
false
);

scanner.render(onScanSuccess);

</script>

</body>
</html>
