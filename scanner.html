<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner Barcode</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

<style>
body{
font-family:Arial;
text-align:center;
padding:10px;
margin:0;
background:#f5f5f5;
}

#reader{
width:100%;
max-width:380px;
margin:auto;
}

#hasil{
font-size:18px;
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<h2>📷 Scan Barcode</h2>

<div id="reader"></div>

<p>Hasil Scan:</p>
<h3 id="hasil">Menyalakan kamera...</h3>

<script>

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const hasil = document.getElementById("hasil");

const scanner = new Html5Qrcode("reader");

scanner.start(
{ facingMode: "environment" },
{
fps: 15,
qrbox: 280
},
(barcode)=>{

console.log("BARCODE:", barcode);

hasil.innerText = barcode;

if(navigator.vibrate){
navigator.vibrate(200);
}

try{

tg.sendData(barcode);

console.log("DATA DIKIRIM KE BOT");

}catch(e){

console.log("ERROR SEND DATA", e);

}

scanner.stop();

setTimeout(()=>{
tg.close();
},500);

},
(error)=>{}
).catch(err=>{
hasil.innerText="❌ Kamera gagal dibuka";
console.log(err);
});

</script>

</body>
</html>
