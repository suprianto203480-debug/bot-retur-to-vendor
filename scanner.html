<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner Barcode</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

<style>
body{
font-family:Arial;
text-align:center;
padding:10px;
margin:0;
background:#f5f5f5;
}

#reader{
width:100%;
max-width:380px;
margin:auto;
}

#hasil{
font-size:18px;
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<h2>📷 Scan Barcode</h2>

<div id="reader"></div>

<p>Hasil Scan:</p>
<h3 id="hasil">Menyalakan kamera...</h3>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const hasil = document.getElementById("hasil");

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
{ facingMode: "environment" },   // kamera belakang
{
fps: 20,                          // scan lebih cepat
qrbox: { width: 300, height: 300 }, // area scan lebih besar
aspectRatio: 1.7778,
disableFlip: false,
experimentalFeatures: {
useBarCodeDetectorIfSupported: true
},
rememberLastUsedCamera: true,
showTorchButtonIfSupported: true   // tombol lampu
},
(decodedText)=>{

hasil.innerText = decodedText;

if(navigator.vibrate){
navigator.vibrate(200); // getar saat berhasil
}

tg.sendData(decodedText);

html5QrCode.stop();

setTimeout(()=>{
tg.close();
},400);

},
(errorMessage)=>{
// abaikan error kecil saat scanning
}
).catch(err=>{
hasil.innerText="❌ Tidak bisa akses kamera";
console.log(err);
});

</script>

</body>
</html>
