<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner Barcode</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
text-align:center;
padding:20px;
}

#reader{
width:320px;
margin:auto;
}

#hasil{
font-size:20px;
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<h2>Scanner Barcode</h2>

<div id="reader"></div>

<p>Hasil Scan:</p>
<div id="hasil">-</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

let lastScan = "";

function onScanSuccess(decodedText){

if(decodedText === lastScan) return;
lastScan = decodedText;

document.getElementById("hasil").innerText = decodedText;

/* kirim data ke bot */
tg.sendData(decodedText);

}

function onScanFailure(error){
/* abaikan agar scanner cepat */
}

const html5QrcodeScanner = new Html5QrcodeScanner(
"reader",
{
fps:15,
qrbox:250,
videoConstraints:{
facingMode:"environment"
}
},
false
);

html5QrcodeScanner.render(onScanSuccess,onScanFailure);

</script>

</body>
</html>
