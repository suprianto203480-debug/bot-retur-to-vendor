<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

let scanned = false;

const html5QrCode = new Html5Qrcode("reader");

function onScanSuccess(decodedText){

if(scanned) return;
scanned = true;

document.getElementById("hasil").innerText = decodedText;

/* stop kamera */
html5QrCode.stop();

/* kembali ke bot */
setTimeout(function(){

tg.openTelegramLink(
"https://t.me/hypermart_retur_vendor_bot?start=" + decodedText
);

},300);

}

/* langsung pakai kamera belakang */
Html5Qrcode.getCameras().then(devices => {

if (devices && devices.length) {

let cameraId = devices[devices.length - 1].id; // biasanya kamera belakang

html5QrCode.start(
cameraId,
{
fps: 10,
qrbox: 250
},
onScanSuccess
);

}

}).catch(err => {
console.log(err);
});

</script>
